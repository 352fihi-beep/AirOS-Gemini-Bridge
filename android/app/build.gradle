plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android' version '1.9.0'
}

android {
    namespace 'com.airos.bridge'
    compileSdk 34
    defaultConfig {
        applicationId "com.airos.bridge"
        minSdk 28
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
}